name: Linux

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Check out code
        uses: actions/checkout@v4

      - name: Download libimageflow static library
        run: |
          curl -sL https://github.com/imazen/imageflow/releases/download/v2.3.0-rc01/staticlib-imageflow-v2.3.0-rc01-linux-musl-x64.staticlib-libimageflow.a.tar.gz | tar xz

      - name: Download test image
        run: curl -sL https://jpeg.org/images/jpeg2000-home.jpg > image.jpg

      - name: Test
        run: CGO_ENABLED=1 go test -v
        env:
          CGO_LDFLAGS: -L. -limageflow -lstdc++ -lm -ldl
